---
jobs:
  ci:
    name: "CI"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v6"
        with:
          cache: "npm"
          node-version-file: ".tool-versions"
      - run: "npm ci --ignore-scripts --no-audit --no-fund --no-update-notifier"
      - run: "npm run lint"
      - run: "npm test"

name: "CI"

"on":
  push:
  pull_request:

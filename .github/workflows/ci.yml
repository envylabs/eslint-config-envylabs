on:
  push:
  pull_request:

name: CI

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .tool-versions
      - run: npm ci
      - run: npm run lint
      - run: npm test
